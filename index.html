<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tupia Workspace</title>
    
    <script>
      if (window.crossOriginIsolated === false) {
        // Esto fuerza al navegador a refrescarse para intentar capturar los headers del Worker
        console.warn("Permisos insuficientes, forzando recarga de seguridad...");
        // No recargamos en bucle, solo una vez
        if (!sessionStorage.getItem("reloaded")) {
          sessionStorage.setItem("reloaded", "true");
          window.location.reload();
        }
      }
    </script>
    
    <script src="/tailwind.js"></script>
  </head>
  <body class="bg-black text-white">
    <div id="root"></div>
    <script type="module" src="./main.jsx"></script>
  </body>
</html>
